name: Discord Push Notifier

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

          CONTENT="🚀 **Push to \`${{ github.ref_name }}\`** in **${{ github.repository }}** by **${{ github.actor }}**
          **Message:** ${{ github.event.head_commit.message }}
          ${{ github.event.head_commit.url }}"

          # Escape special JSON characters
          CONTENT=$(echo "$CONTENT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))')

          curl -sfS -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Content-Type: application/json" \
            -d "{\"content\": $CONTENT}" \
            "$DISCORD_WEBHOOK_URL"