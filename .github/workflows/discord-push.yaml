name: Discord AI Push Summary

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build diff (truncated)
        run: |
          git diff --unified=2 HEAD~1 HEAD | head -c 12000 > /tmp/diff.txt

      - name: Generate AI summary and post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPEN_AI_KEY }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMPARE_URL: https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}
        run: |
          python3 <<'PY'
          import os, json, urllib.request, textwrap

          webhook = os.environ["DISCORD_WEBHOOK_URL"]
          api_key = os.environ["OPENAI_API_KEY"]

          # Debug: confirm secrets are populated (prints length only, not the value)
          print(f"OPENAI_API_KEY length: {len(api_key)}")
          print(f"DISCORD_WEBHOOK_URL length: {len(webhook)}")
          if not api_key:
              print("ERROR: OPENAI_API_KEY is empty. Check GitHub repo Settings > Secrets > Repository secrets.")
              raise SystemExit(1)

          diff_path = "/tmp/diff.txt"
          diff = open(diff_path).read() if os.path.exists(diff_path) else ""
          repo = os.environ.get('REPO', '')
          branch = os.environ.get('BRANCH', '')
          actor = os.environ.get('ACTOR', '')
          commit_msg = os.environ.get('COMMIT_MSG', '')
          commit_url = os.environ.get('COMMIT_URL', '')
          compare_url = os.environ.get('COMPARE_URL', '')

          prompt = textwrap.dedent(f"""\
          Summarize this Git push for the engineering team.

          Return:
          - 3-6 bullet summary of what changed
          - Risk areas or possible breakages
          - Concrete things to test next

          Repository: {repo}
          Branch: {branch}
          Author: {actor}
          Commit message: {commit_msg}
          Commit URL: {commit_url}

          Diff (truncated):
          {diff}
          """)

          # Call OpenAI Responses API
          req = urllib.request.Request(
              "https://api.openai.com/v1/responses",
              data=json.dumps({
                  "model": "gpt-4.1-mini",
                  "input": prompt
              }).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"OpenAI API error {e.code}: {body}")
              raise

          text = ""
          for item in data.get("output", []):
              for c in item.get("content", []):
                  if c.get("type") == "output_text":
                      text += c.get("text", "")

          text = text.strip() or "Summary unavailable."

          header = (
              f"🤖 **AI Push Summary**\n"
              f"🔗 Commit: {commit_url}\n"
              f"📊 Compare: {compare_url}\n\n"
          )

          message = (header + text)[:1900]

          dreq = urllib.request.Request(
              webhook,
              data=json.dumps({"content": message}).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "GitHub-Actions-Bot/1.0",
              },
          )

          try:
              urllib.request.urlopen(dreq).read()
              print("Discord notification sent.")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"Discord error {e.code}: {body}")
              raise
          PY