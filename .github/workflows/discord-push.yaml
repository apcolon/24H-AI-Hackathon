name: Discord Push Notifier

on:
  push:
    branches: ["main"]   # change if your default branch isn't main

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret"
            exit 1
          fi

          python3 - <<'PY'
          import os, json, urllib.request

          url = os.environ["DISCORD_WEBHOOK_URL"]
          actor = os.environ.get("ACTOR","")
          repo = os.environ.get("REPO","")
          branch = os.environ.get("BRANCH","")
          msg = os.environ.get("COMMIT_MSG","").strip()
          commit_url = os.environ.get("COMMIT_URL","")

          content = f"🚀 **Push to `{branch}`** in **{repo}** by **{actor}**\n**Message:** {msg}\n{commit_url}"
          data = json.dumps({"content": content}).encode("utf-8")

          req = urllib.request.Request(url, data=data, headers={"Content-Type":"application/json"})
          with urllib.request.urlopen(req) as resp:
            print("Discord response:", resp.status)
          PY